global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    authorization:
      type: Bearer
      # Provided at container startup from INTERNAL_API_TOKEN.
      credentials_file: /tmp/internal_api_token
    static_configs:
      - targets: ["api:8000"]

  - job_name: "worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9001"]

  - job_name: "fake_internal_service"
    metrics_path: /metrics
    static_configs:
      - targets: ["fake-internal-service:8100"]

  - job_name: "otel_collector"
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:9464"]
